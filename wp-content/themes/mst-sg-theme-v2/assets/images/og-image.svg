<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#0e3558"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>
  <!-- Logo Text -->
  <text x="100" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#3b82f6" letter-spacing="4">MST</text>
  <!-- Company Name -->
  <text x="100" y="280" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.7)">Moore Solution Technology</text>
  <!-- Tagline -->
  <text x="100" y="350" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="#ffffff">Deploying AI</text>
  <text x="100" y="410" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="#ffffff">Where It Matters</text>
  <!-- Subtitle -->
  <text x="100" y="470" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">Industrial · Commercial · Consumer — From Singapore to the World</text>
  <!-- Badge -->
  <rect x="100" y="510" width="200" height="36" rx="18" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="200" y="534" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="2">5 AI PLATFORMS</text>
  <rect x="320" y="510" width="200" height="36" rx="18" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="420" y="534" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="2">3+ COUNTRIES</text>
  <rect x="540" y="510" width="200" height="36" rx="18" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="640" y="534" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="2">50+ CLIENTS</text>
  <!-- Decorative dots -->
  <circle cx="900" cy="200" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="1000" cy="300" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="950" cy="400" r="5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1050" cy="180" r="3" fill="#38bdf8" opacity="0.3"/>
  <circle cx="1100" cy="350" r="4" fill="#38bdf8" opacity="0.2"/>
  <!-- Connection lines -->
  <line x1="900" y1="200" x2="1000" y2="300" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="1000" y1="300" x2="950" y2="400" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="1050" y1="180" x2="1100" y2="350" stroke="#3b82f6" stroke-width="0.5" opacity="0.1"/>
  <line x1="900" y1="200" x2="1050" y2="180" stroke="#3b82f6" stroke-width="0.5" opacity="0.1"/>
  <!-- URL -->
  <text x="100" y="590" font-family="system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" letter-spacing="1">mst-sg.com</text>
</svg>
